<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Aşkım Sorusu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: linear-gradient(135deg, #FFB6D9 0%, #FFC9E3 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .hearts-left {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 50px;
      z-index: 10;
    }

    .heart {
      display: inline-block;
      animation: beat 1s infinite;
      margin-right: 5px;
    }

    .heart:nth-child(1) { animation-delay: 0s; }
    .heart:nth-child(2) { animation-delay: 0.2s; }
    .heart:nth-child(3) { animation-delay: 0.4s; }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .top-right {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 13px;
      color: #333;
      z-index: 10;
    }

    .center-text {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: black;
      font-size: 65px;
      font-weight: bold;
      text-shadow: 4px 4px 0 white, -4px -4px 0 white, 4px -4px 0 white, -4px 4px 0 white;
      text-align: center;
      z-index: 20;
      white-space: nowrap;
    }

    .buttons {
      position: fixed;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 50px;
      z-index: 20;
    }

    button {
      padding: 20px 50px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .red-btn {
      background-color: #FF5555;
      color: white;
      opacity: 0.5;
      cursor: not-allowed !important;
    }

    .red-btn:hover {
      opacity: 0.5;
    }

    .btn {
      background-color: #4CAF50;
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
      background-color: #45a049;
    }

    .warning {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: red;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 15;
    }

    .warning.show {
      opacity: 1;
    }

    .floating-heart {
      position: fixed;
      font-size: 40px;
      pointer-events: none;
      z-index: 5;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
      25% { transform: translateY(-80px) translateX(80px) rotate(90deg); }
      50% { transform: translateY(-160px) translateX(0) rotate(180deg); opacity: 0.6; }
      75% { transform: translateY(-80px) translateX(-80px) rotate(270deg); }
    }
  </style>
</head>
<body>
  <div class="hearts-left">
    <span class="heart">❤️</span>
    <span class="heart">❤️</span>
    <span class="heart">❤️</span>
  </div>

  <div class="top-right">beni çok seviyorsun</div>

  <div class="center-text" id="mainText">Dışarı mı çıkacaksın aşkım?</div>

  <div class="buttons" id="buttons">
    <button id="yesBtn" class="red-btn">EVET</button>
    <button id="noBtn" class="btn">HAYIR</button>
  </div>

  <div id="warning" class="warning"></div>

  <script src="script.js"></script>
</body>
</html>
